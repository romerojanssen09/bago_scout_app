<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Location Picker</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* Crosshair pin fixed at the center — always shows the map center */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair svg { display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35)); }

        /* Pulsing ring under the pin when dragging */
        #pin-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            margin-left: -12px;
            margin-top: -12px;
            border-radius: 50%;
            border: 2px solid #6C63FF;
            opacity: 0;
            pointer-events: none;
            z-index: 9;
            transition: opacity 0.2s;
        }
        #pin-ring.active { opacity: 1; animation: ripple 0.8s ease-out infinite; }
        @keyframes ripple {
            from { transform: scale(0.8); opacity: 1; }
            to   { transform: scale(2.2); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Fixed crosshair at center of viewport -->
    <div id="crosshair">
        <svg width="36" height="44" viewBox="0 0 36 44" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 2C11.37 2 6 7.37 6 14c0 10.5 12 28 12 28s12-17.5 12-28C30 7.37 24.63 2 18 2z" fill="#6C63FF"/>
            <circle cx="18" cy="14" r="6" fill="white"/>
        </svg>
    </div>
    <div id="pin-ring"></div>

    <!-- bridge iframe -->
    <iframe id="bridge" style="display:none" src="about:blank"></iframe>

    <script>
        // notify() via iframe — fires for the initial map_ready signal
        function notify(msg) {
            document.getElementById('bridge').src = 'mauibridge://' + msg;
        }

        // notifyNav() via a valid https fake URL — reliably fires MAUI's Navigating
        // for coordinate responses where iframe silently fails.
        function notifyNav(msg) {
            window.location.href = 'https://mauibridge.local/' + encodeURIComponent(msg);
        }

        mapboxgl.accessToken = '{{TOKEN}}';

        var map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/streets-v12',
            center: [122.8425853, 10.5288236],
            zoom: 13,
            attributionControl: false
        });

        var ring = document.getElementById('pin-ring');

        map.on('dragstart', function() { ring.className = 'active'; });
        map.on('dragend',   function() { ring.className = ''; });
        map.on('touchstart',function() { ring.className = 'active'; });
        map.on('touchend',  function() { ring.className = ''; });

        // Tap on map — move center to tapped point
        map.on('click', function(e) {
            map.flyTo({ center: e.lngLat, duration: 200 });
        });

        map.on('load', function() {
            notify('map_ready');
        });

        // Called from C# "Use This Location" button
        function confirmLocation() {
            var c = map.getCenter();
            var lat = c.lat.toFixed(7);
            var lng = c.lng.toFixed(7);
            notifyNav('location_selected:' + lat + ',' + lng);
        }
    </script>
</body>
</html>
